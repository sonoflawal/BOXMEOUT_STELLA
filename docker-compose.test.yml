version: '3.9'

services:
  postgres_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: boxmeout
      POSTGRES_PASSWORD: boxmeout
      POSTGRES_DB: boxmeout_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boxmeout']
      interval: 10s
      timeout: 5s
      retries: 5

  redis_test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
